<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>green family guy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --green: #00ff41;
    --green-dim: #00b32c;
    --green-faint: #003311;
    --green-glow: rgba(0, 255, 65, 0.15);
    --bg: #030a04;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  a, a:link, a:visited, a:hover, a:active {
    color: inherit;
    text-decoration: none;
  }

  /* ── VIDEO ── */
  .main-stage {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    flex-shrink: 0;
  }

  #fg-player {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .green-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 255, 40, 0.72);
    mix-blend-mode: multiply;
    pointer-events: none;
    z-index: 10;
  }

  /* Start screen */
  .start-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: var(--bg);
    z-index: 50;
    cursor: pointer;
    transition: opacity 0.4s;
  }

  .start-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .start-label {
    font-size: 11px;
    letter-spacing: 4px;
    opacity: 0.4;
    text-transform: uppercase;
  }

  .start-btn {
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 14px 36px;
    background: transparent;
    cursor: pointer;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── CONTROLS PANEL ── */
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-top: 1px solid var(--green-faint);
    padding: 0 16px;
  }

  /* Track info row */
  .track-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 14px 0 10px;
    border-bottom: 1px solid var(--green-faint);
    gap: 12px;
  }

  .track-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .track-block.right {
    text-align: right;
    align-items: flex-end;
  }

  .track-label {
    font-size: 9px;
    letter-spacing: 3px;
    opacity: 0.35;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .track-name {
    font-size: 12px;
    letter-spacing: 1px;
    opacity: 0.8;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Buttons row */
  .btn-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    gap: 12px;
  }

  .ctrl-btn {
    background: transparent;
    border: 1px solid var(--green-faint);
    color: var(--green-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 18px;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 44px;
    transition: border-color 0.1s, color 0.1s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }

  .ctrl-btn:active {
    border-color: var(--green);
    color: var(--green);
  }

  /* Slider */
  .overlay-control {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    letter-spacing: 2px;
    opacity: 0.45;
    text-transform: uppercase;
    flex: 1;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--green-faint);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: var(--green);
    border-radius: 0;
    cursor: pointer;
  }

  input[type=range]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    background: var(--green);
    border: none;
    border-radius: 0;
    cursor: pointer;
  }

  /* ── FOOTER ── */
  footer.footer-note {
    flex-shrink: 0;
    font-size: 9px;
    letter-spacing: 2px;
    opacity: 0.25;
    text-align: center;
    padding: 10px 16px;
    /* Keeps footer above the home indicator on notched iPhones */
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--green-faint);
  }

  /* ── BOC PLAYER (must be in DOM + have layout to play) ── */
  .boc-wrapper {
    position: fixed;
    bottom: -200px;
    left: 0;
    width: 2px;
    height: 2px;
    overflow: visible;
    opacity: 0.001;
    pointer-events: none;
  }

  #boc-player {
    width: 320px;
    height: 80px;
    border: none;
  }
</style>
</head>
<body>

<div class="main-stage">
  <iframe
    id="fg-player"
    src=""
    allow="autoplay; encrypted-media"
    allowfullscreen
    title="Family Guy"
  ></iframe>

  <div class="green-overlay" id="greenOverlay"></div>

  <div class="start-screen" id="startScreen" onclick="startAll()">
    <div class="start-label">tap to play</div>
    <button class="start-btn">▶ play</button>
  </div>
</div>

<div class="panel">
  <div class="track-row">
    <div class="track-block">
      <div class="track-label">clip</div>
      <div class="track-name" id="fgLabel">—</div>
    </div>
    <div class="track-block right">
      <div class="track-label">now playing</div>
      <div class="track-name" id="bocLabel">—</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="ctrl-btn" onclick="prevFG()">◂ clip</button>
    <div class="overlay-control">
      green
      <input type="range" min="0" max="100" value="72" oninput="setOverlay(this.value)">
    </div>
    <button class="ctrl-btn" onclick="nextBOC()">track ▸</button>
  </div>
</div>

<footer class="footer-note">
  credit to: <a href="https://www.instagram.com/dktamt">(IG) @dktamt</a> for the idea.
</footer>

<div class="boc-wrapper">
  <iframe id="boc-player" src="" allow="autoplay; encrypted-media" title="Boards of Canada"></iframe>
</div>

<script>
  const FG_CLIPS = [
    { id: 'JQDFgbWIEeA', title: 'funny moments vol. 1' },
    { id: 'IohiBXQ_sGc', title: 'funny moments vol. 2' },
    { id: 'kaRbE_PTDj8', title: 'funny moments vol. 3' },
    { id: 'm_YPRD1oz0o', title: 'stewie funny moments' },
    { id: 'YLlESzfEvmU', title: 'peter griffin funny moments' },
  ];

  const BOC_TRACKS = [
    { id: 'SM4tQcUt_mQ', title: 'roygbiv' },
    { id: 'MEFSU7WeZt0', title: 'happy cycling' },
    { id: 'YSi78g2CXCM', title: 'music is math' },
    { id: '4uPMG7S2f3g', title: 'aquarius' },
    { id: 'u8tyqgRaY_g', title: 'telephasic workshop' },
    { id: 'IXGTZ7r9C1M', title: 'sixtyten' },
  ];

  let fgIndex = 0;
  let bocIndex = 0;

  function fgSrc(id) {
    return `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1&iv_load_policy=3`;
  }

  function bocSrc(id) {
    return `https://www.youtube.com/embed/${id}?autoplay=1&mute=0&controls=0&rel=0&modestbranding=1`;
  }

  function startAll() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('fg-player').src  = fgSrc(FG_CLIPS[fgIndex].id);
    document.getElementById('boc-player').src = bocSrc(BOC_TRACKS[bocIndex].id);
    updateLabels();
  }

  function prevFG() {
    fgIndex = (fgIndex - 1 + FG_CLIPS.length) % FG_CLIPS.length;
    document.getElementById('fg-player').src = fgSrc(FG_CLIPS[fgIndex].id);
    updateLabels();
  }

  function nextBOC() {
    bocIndex = (bocIndex + 1) % BOC_TRACKS.length;
    document.getElementById('boc-player').src = bocSrc(BOC_TRACKS[bocIndex].id);
    updateLabels();
  }

  function updateLabels() {
    document.getElementById('fgLabel').textContent  = FG_CLIPS[fgIndex].title;
    document.getElementById('bocLabel').textContent = BOC_TRACKS[bocIndex].title;
  }

  function setOverlay(val) {
    document.getElementById('greenOverlay').style.background =
      `rgba(0, 255, 40, ${val / 100})`;
  }

  updateLabels();
</script>
</body>
</html>
